name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Bazel test (${{ matrix.os }}, ${{ matrix.shard.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2025]
        shard:
        - name: sip-optimal-control
          targets: //sip-optimal-control/...
        - name: sip-qdldl
          targets: //sip-qdldl/...
        - name: sip-slacg
          targets: //sip-slacg/...

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.shard.name }}
        repository-cache: true

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

    - name: Test
      run: bazel test --test_output=errors ${{ matrix.shard.targets }}

  maros-meszaros:
    name: Maros-Meszaros corpus (ubuntu-24.04)
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-maros-meszaros-ubuntu-24.04
        repository-cache: true

    - name: Test
      run: bazel test --test_output=errors @maros_meszaros//...
