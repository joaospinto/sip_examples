name: DEVGLA2NE isolation

on:
  workflow_dispatch:
  push:
    branches: [debug-cutest-devgla2-isolation-20260716]

permissions:
  contents: read

jobs:
  devgla2ne:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: baseline
          examples_ref: debug-cutest-devgla2-baseline-20260716
          sip_ref: ""
          qdldl_ref: ""
          sipoc_ref: ""
        - name: candidate
          examples_ref: debug-cutest-devgla2-isolation-20260716
          sip_ref: debug-proximal-rejection-reset-20260715
          qdldl_ref: debug/review-target-singletons-final-20260716
          sipoc_ref: debug/factor-api-clean-20260715
        - name: candidate-original-equality-products
          examples_ref: debug-cutest-devgla2-isolation-20260716
          sip_ref: debug-proximal-rejection-reset-20260715
          qdldl_ref: debug/original-equality-products-20260716
          sipoc_ref: debug/factor-api-clean-20260715

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ matrix.examples_ref }}
    - if: matrix.sip_ref != ''
      uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: ${{ matrix.sip_ref }}
        path: .deps/sip
    - if: matrix.qdldl_ref != ''
      uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: ${{ matrix.qdldl_ref }}
        path: .deps/sip_qdldl
    - if: matrix.sipoc_ref != ''
      uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: ${{ matrix.sipoc_ref }}
        path: .deps/sip_optimal_control
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: devgla2ne-${{ matrix.name }}
        repository-cache: true
    - name: Run DEVGLA2NE repeatedly
      run: |
        for run in 1 2 3 4 5; do
          echo "=== DEVGLA2NE run ${run} ==="
          bazel test \
            --cache_test_results=no \
            --test_output=all \
            @cutest_sif//:DEVGLA2NE || true
        done
