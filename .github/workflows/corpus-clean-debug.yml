name: CUTEst scalar-floor regularization check

on:
  workflow_dispatch:
  push:
    branches: [debug-cutest-floor-adaptive-regularization-20260716]

permissions:
  contents: read

jobs:
  cutest:
    name: Focused CUTEst checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug/pdal-common-step-20260716
        path: .deps/sip
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/primal-regularization-scaling-20260716
        path: .deps/sip_qdldl
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-floor-adaptive-regularization
        repository-cache: true
    - name: Run focused CUTEst checks
      run: |
        bazel test \
          @cutest_sif//:CYCLIC3LS \
          @cutest_sif//:HS7 \
          @cutest_sif//:HS102 \
          @cutest_sif//:POLAK6 \
          --test_output=errors \
          --nocache_test_results \
          --test_env=SIP_CUTEST_EQUILIBRATE_PRIMAL_REGULARIZATION=1 \
          --test_env=SIP_CUTEST_EXTEND_REGULARIZATION_RANGE=1 \
          --test_env=SIP_CUTEST_START_LS_WITH_ALPHA_S_MAX=1
