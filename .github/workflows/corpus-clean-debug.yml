name: Filter component isolation

on:
  workflow_dispatch:
  push:
    branches: [debug-cutest-filter-isolation-20260716]

permissions:
  contents: read

jobs:
  cutest:
    name: CUTEst ${{ matrix.variant.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        variant:
        - name: barrier objective only
          sip_ref: debug/barrier-objective-only-20260716
        - name: filter reset only
          sip_ref: debug/filter-reset-only-20260716

    steps:
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: ${{ matrix.variant.sip_ref }}
        path: .deps/sip
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/configurable-constraint-products-20260716
        path: .deps/sip_qdldl
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: filter-component-${{ matrix.variant.name }}
        repository-cache: true
    - name: Test changed CUTEst cases
      continue-on-error: true
      run: >-
        bazel test --keep_going --build_manual_tests --test_output=errors
        @cutest_sif//:CLEUVEN3
        @cutest_sif//:CLEUVEN5
        @cutest_sif//:CRESC100
        @cutest_sif//:ELEC
        @cutest_sif//:HADAMARD
        @cutest_sif//:MINPERM
        @cutest_sif//:OET2
