name: Constraint product direction isolation

on:
  workflow_dispatch:
  push:
    branches: [debug-product-direction-isolation-20260716]

permissions:
  contents: read

jobs:
  maros:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: compensated
          qdldl_ref: debug/review-target-singletons-final-20260716
        - name: original-equality
          qdldl_ref: debug/original-equality-products-20260716
        - name: original-all
          qdldl_ref: debug/original-constraint-products-20260716

    steps:
    - uses: actions/checkout@v7
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug-proximal-rejection-reset-20260715
        path: .deps/sip
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: ${{ matrix.qdldl_ref }}
        path: .deps/sip_qdldl
    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: product-direction-${{ matrix.name }}
        repository-cache: true
    - name: Run affected Maros problems
      run: |
        bazel test \
          --cache_test_results=no \
          --test_output=all \
          @maros_meszaros//:BOYD1 \
          @maros_meszaros//:QSTAIR
