name: CUTEst dual regularization retry A/B

on:
  workflow_dispatch:
  push:
    branches: [debug/cutest-dual-regularization-retry-ab-20260715]

permissions:
  contents: read

jobs:
  cutest:
    name: CUTEst ${{ matrix.variant }} shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
        - variant: control
          shard: 2
          sip_ref: debug/dual-regularization-retry-control-20260715
        - variant: candidate
          shard: 2
          sip_ref: debug/dual-regularization-retry-candidate-20260715

    steps:
    - uses: actions/checkout@v7

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: ${{ matrix.sip_ref }}
        path: .deps/sip

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/cutest-current-20260716
        path: .deps/sip_qdldl

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-dual-retry-${{ matrix.variant }}-${{ matrix.shard }}
        repository-cache: true

    - name: Classify CUTEst shard
      env:
        SIP_CORPUS_SHARD_COUNT: 12
        SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
      run: |
        test "$(bazel query 'kind(".*_test", @cutest_sif//:*)' --output=label | wc -l)" -eq 1539
        tools/cutest/classify_corpus.sh \
          cutest_sif \
          ".corpus-runs/${{ matrix.variant }}" \
          20 \
          2

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-dual-retry-${{ matrix.variant }}-${{ matrix.shard }}
        path: .corpus-runs/${{ matrix.variant }}
