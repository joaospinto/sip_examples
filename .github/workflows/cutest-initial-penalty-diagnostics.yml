name: CUTEst factorization source classification

on:
  workflow_dispatch:
  push:
    branches: [debug/cutest-factorization-source-corpus-20260715]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v7

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug/linearized-constraint-progress-20260715
        path: .deps/sip

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/factorization-diagnostics-20260715
        path: .deps/sip_qdldl

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-factorization-source-corpus
        repository-cache: true

    - name: Classify factorization failures
      continue-on-error: true
      run: |
        targets=(
          BA-L73 BOXBOD BRATU1D CATENA CERI651A CERI651B CERI651C CERI651D
          CERI651E CHEBYQADNE CHEMRCTA CHEMRCTB CORE1 CORE2 CRESC100 CRESC132
          CRESC50 CYCLOOCF CYCLOOCT DIAMON2D DIAMON3D DIAMON3DLS DISCS DITTERT
          DIXCHLNV DMN15102 DMN15102LS DMN15103 DMN15103LS DMN15332 DMN15333
          DMN15333LS DMN37143 DMN37143LS ENSO FBRAIN3LS GLIDER HAHN1 HEART6LS
          HIMMELBFNE HIMMELBJ HS81 HS99EXP KOEBHELBNE KOWOSBNE KTMODEL LHAIFAM
          LIN LUKSAN12 MESH MGH10LS MGH10SLS MGH17S MODEL NET2 NET3 NET4
          NONMSQRTNE NYSTROM5C OSBORNE2 PALMER1ANE PALMER1BNE PALMER3NE
          PALMER4NE PALMER5ANE POLYGEVEN QCNEW RAT43 RAYBENDL RAYBENDS REPEAT
          ROBOTARM S365 S365MOD SARO SEMICN2U SEMICON1 SPIRAL STEENBRB STEENBRD
          STEENBRE STEENBRF THURBER VANDERM4 VESUVIA VESUVIO VESUVIOU
          VIBRBEAMNE WALL10 WATER WEEDSNE
        )
        labels=()
        for target in "${targets[@]}"; do
          labels+=("@cutest_sif//:${target}")
        done
        bazel test "${labels[@]}" \
          --test_output=errors \
          --test_timeout=120 \
          --test_env=SIP_CUTEST_SELECT_QP_MODE_BY_INERTIA=1 \
          --test_env=SIP_CUTEST_NLP_INITIAL_PENALTY=100 \
          > diagnostics.log 2>&1

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-factorization-source-corpus
        path: diagnostics.log
