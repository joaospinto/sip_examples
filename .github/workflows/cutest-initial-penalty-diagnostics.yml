name: CUTEst QDLDL factorization diagnostics

on:
  workflow_dispatch:
  push:
    branches: [debug/cutest-factorization-diagnostics-20260715]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v7

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug/linearized-constraint-progress-20260715
        path: .deps/sip

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/factorization-diagnostics-20260715
        path: .deps/sip_qdldl

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-factorization-diagnostics
        repository-cache: true

    - name: Diagnose immediate factorization failures
      continue-on-error: true
      run: |
        targets=(
          DITTERT LHAIFAM NET2 NET3 NET4 S365 S365MOD STEENBRD STEENBRE
        )
        labels=()
        for target in "${targets[@]}"; do
          labels+=("@cutest_sif//:${target}")
        done
        bazel test "${labels[@]}" \
          --test_output=errors \
          --test_timeout=120 \
          --test_env=SIP_CUTEST_SELECT_QP_MODE_BY_INERTIA=1 \
          --test_env=SIP_CUTEST_NLP_INITIAL_PENALTY=100 \
          --test_env=SIP_CUTEST_PRINT_LOGS=1 \
          > diagnostics.log 2>&1

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-factorization-diagnostics
        path: diagnostics.log
