name: CUTEst non-finite backtracking validation

on:
  workflow_dispatch:
  push:
    branches: [debug/cutest-nonfinite-backtracking-targeted-20260715]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v7

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug/backtrack-nonfinite-trials-20260715
        path: .deps/sip

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/factorization-diagnostics-20260715
        path: .deps/sip_qdldl

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-nonfinite-backtracking-targeted
        repository-cache: true

    - name: Validate non-finite trial backtracking
      continue-on-error: true
      run: |
        targets=(
          CERI651E CHEMRCTA CHEMRCTB CRESC100 CRESC132 CRESC50 HS81 LIN
          MGH10SLS MODEL RAT43 REPEAT SARO SPIRAL STEENBRB STEENBRF VANDERM4
          WALL10 WATER
        )
        labels=()
        for target in "${targets[@]}"; do
          labels+=("@cutest_sif//:${target}")
        done
        bazel test "${labels[@]}" \
          --test_output=errors \
          --test_timeout=120 \
          --test_env=SIP_CUTEST_SELECT_QP_MODE_BY_INERTIA=1 \
          --test_env=SIP_CUTEST_NLP_INITIAL_PENALTY=100 \
          > diagnostics.log 2>&1

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-nonfinite-backtracking-targeted
        path: diagnostics.log
