name: CUTEst adaptive penalty decrease validation

on:
  workflow_dispatch:
  push:
    branches: [debug/cutest-adaptive-penalty-decrease-20260715]

permissions:
  contents: read

jobs:
  diagnostics:
    name: Decrease factor ${{ matrix.factor }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        factor: [0.5, 0.1, 0.01]

    steps:
    - uses: actions/checkout@v7

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip
        ref: debug/linearized-constraint-progress-20260715
        path: .deps/sip

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_qdldl
        ref: debug/cutest-current-20260716
        path: .deps/sip_qdldl

    - uses: actions/checkout@v7
      with:
        repository: joaospinto/sip_optimal_control
        ref: debug/factor-api-clean-20260715
        path: .deps/sip_optimal_control

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: cutest-adaptive-penalty-decrease-${{ matrix.factor }}
        repository-cache: true

    - name: Validate changed classifications
      continue-on-error: true
      env:
        FACTOR: ${{ matrix.factor }}
      run: |
        targets=(
          ARGLINC BRAINPC2 BRAINPC3 BRAINPC4 BRAINPC5 BRAINPC6 BRITGAS
          CATENA CHAIN DALLASL EIGENAU ELATTAR FLOSP2TH FLOSP2TM GAUSSELM
          GULFNE HADAMARD HAIFAL HS40 HS68 HS69 HS101 HS103 HS104 KISSING
          KSSLS LAKES LEWISPOL LIARWHDNE LUKVLE15 MSS2 ORBIT2 POLAK6
          POLYGEVEN READING7 RK23 ROBOTARM ROCKET SNAKE SPARSINE SPECANNE
          STANCMIN STEENBRB STEENBRF TRO3X3 TRO4X4 TRO5X5 TRO6X2 TWIRIMD1
          ZIGZAG
        )
        labels=()
        for target in "${targets[@]}"; do
          labels+=("@cutest_sif//:${target}")
        done
        options=(
          --test_output=errors
          --test_timeout=120
          --test_env=SIP_CUTEST_SELECT_QP_MODE_BY_INERTIA=1
          --test_env=SIP_CUTEST_INITIALIZE_FROM_LINEARIZED_CONSTRAINT_REDUCTION=1
          --test_env=SIP_CUTEST_NLP_PENALTY_DECREASE_FACTOR=${FACTOR}
        )
        bazel test "${labels[@]}" "${options[@]}" > diagnostics.log 2>&1

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-adaptive-penalty-decrease-${{ matrix.factor }}
        path: diagnostics.log
