name: CUTEst IPOPT debug

on:
  workflow_dispatch:
  push:
    branches: [debug-ipopt-cutest-tail-20260713]

permissions:
  contents: read

jobs:
  cutest:
    name: IPOPT CUTEst shard 15 ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: prefix
          offset: 0
          limit: 90
        - name: tail-0
          offset: 90
          limit: 1
        - name: tail-1
          offset: 91
          limit: 1
        - name: tail-2
          offset: 92
          limit: 1
        - name: tail-3
          offset: 93
          limit: 1
        - name: tail-4
          offset: 94
          limit: 1
        - name: tail-5
          offset: 95
          limit: 1

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-15
        repository-cache: true

    - name: Classify CUTEst shard with IPOPT
      env:
        SIP_CORPUS_SHARD_COUNT: 16
        SIP_CORPUS_SHARD_INDEX: 15
        SIP_CORPUS_SHARD_OFFSET: ${{ matrix.offset }}
        SIP_CORPUS_SHARD_LIMIT: ${{ matrix.limit }}
      run: tools/cutest/classify_corpus.sh @cutest_sif//ipopt .corpus-runs/cutest-ipopt-corrected 10 2

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-ipopt-corrected-15-${{ matrix.name }}
        path: .corpus-runs/cutest-ipopt-corrected
