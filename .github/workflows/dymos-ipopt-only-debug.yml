name: Dymos IPOPT debug

on:
  push:
    branches:
      - debug-dymos-model-equivalence-20260713

jobs:
  dymos:
    name: ${{ matrix.backend }} / shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        backend:
          - sip-ipopt
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v7
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.backend }}-${{ matrix.shard }}
          repository-cache: true
      - name: Classify Dymos shard
        env:
          SIP_CORPUS_SHARD_COUNT: 4
          SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
        run: >-
          tools/cutest/classify_corpus.sh
          //${{ matrix.backend }}/casadi_problems/dymos
          .corpus-runs/dymos-${{ matrix.backend }}-${{ matrix.shard }}
          8
          2
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dymos-${{ matrix.backend }}-${{ matrix.shard }}
          path: .corpus-runs/dymos-${{ matrix.backend }}-${{ matrix.shard }}
