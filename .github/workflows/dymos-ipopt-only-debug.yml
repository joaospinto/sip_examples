name: Dymos IPOPT-only debug

on:
  push:
    branches:
      - debug-dymos-model-equivalence-20260713

jobs:
  compare:
    name: ${{ matrix.problem }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        problem:
          - finite_burn_orbit_raise
    steps:
      - uses: actions/checkout@v7
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.problem }}
          repository-cache: true
      - name: Compare generated models
        run: >-
          bazel test
          //problem_definitions/casadi_problems/dymos/${{ matrix.problem }}:${{ matrix.problem }}_model_equivalence
          --test_output=all
      - name: Run all backends
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --keep_going
          --test_output=all
      - name: Run SIP with line search
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=line_search
          --test_output=all
      - name: Run SIP with line search and larger regularization ceiling
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=line_search_max_regularization
          --test_output=all
      - name: Run SIP with fixed penalties
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=fixed_penalty
          --test_output=all
      - name: Run SIP with line search and fixed penalties
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=line_search_fixed_penalty
          --test_output=all
      - name: Run SIP with predictor-corrector
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=predictor_corrector
          --test_output=all
      - name: Run SIP with filter line search
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=filter_line_search
          --test_output=all
      - name: Run SIP with predictor-corrector and filter
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=predictor_corrector_filter
          --test_output=all
      - name: Run IPOPT without NLP scaling
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=no_scaling
          --test_output=all
      - name: Run IPOPT with Mehrotra algorithm
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=mehrotra
          --test_output=all
      - name: Run IPOPT with limited-memory Hessian
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=limited_memory
          --test_output=all
