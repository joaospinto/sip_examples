name: Dymos IPOPT-only debug

on:
  push:
    branches:
      - debug-dymos-model-equivalence-20260713

jobs:
  compare:
    name: ${{ matrix.problem }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        problem:
          - cannonball_implicit_duration
          - commercial_aircraft
          - min_time_climb
          - ssto_earth
    steps:
      - uses: actions/checkout@v7
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.problem }}
          repository-cache: true
      - name: Run IPOPT default
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_output=all
      - name: Run IPOPT without globalization
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=accept_every_trial_step
          --test_output=all
      - name: Run IPOPT without second-order corrections
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=no_soc
          --test_output=all
      - name: Run IPOPT without watchdog
        continue-on-error: true
        run: >-
          bazel test
          //sip-ipopt/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --test_env=IPOPT_ABLATION=no_watchdog
          --test_output=all
