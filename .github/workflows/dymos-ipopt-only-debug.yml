name: Low-thrust fidelity debug

on:
  push:
    branches:
      - debug-dymos-model-equivalence-20260713

jobs:
  dymos:
    name: ${{ matrix.backend }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        backend:
          - sip-optimal-control
          - sip-qdldl
          - sip-ipopt
    steps:
      - uses: actions/checkout@v7
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.backend }}
          repository-cache: true
      - name: Test upstream low-thrust initialization
        run: |
          printf 'low_thrust_spiral\n' > /tmp/dymos-problems.txt
          SIP_CORPUS_PROBLEMS_FILE=/tmp/dymos-problems.txt \
            tools/cutest/classify_corpus.sh \
              //${{ matrix.backend }}/casadi_problems/dymos \
              .corpus-runs/low-thrust-${{ matrix.backend }} \
              1 \
              1
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: low-thrust-${{ matrix.backend }}
          path: .corpus-runs/low-thrust-${{ matrix.backend }}
          include-hidden-files: true
