name: Dymos IPOPT-only debug

on:
  push:
    branches:
      - debug-dymos-model-equivalence-20260713

jobs:
  compare:
    name: ${{ matrix.problem }} / ${{ matrix.ablation }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        problem:
          - min_time_climb
        ablation:
          - line_search_alpha_max_max_regularization
          - line_search_alpha_max_step_aware_penalty
          - line_search_alpha_max_step_aware_penalty_max_regularization
    steps:
      - uses: actions/checkout@v7
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.problem }}
          repository-cache: true
      - name: Run SIP ablation
        continue-on-error: true
        run: >-
          bazel test
          //sip-optimal-control/casadi_problems/dymos:${{ matrix.problem }}
          //sip-qdldl/casadi_problems/dymos:${{ matrix.problem }}
          --cache_test_results=no
          --keep_going
          --test_env=SIP_CASADI_PROBLEMS_ABLATION=${{ matrix.ablation }}
          --test_output=all
