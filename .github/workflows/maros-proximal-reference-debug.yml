name: Maros minimal exact proximal-QP validation

on:
  workflow_dispatch:
  push:
    branches: [debug-maros-proximal-exact-factor-only-20260716]

permissions:
  contents: read

jobs:
  maros:
    name: Maros shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
    - uses: actions/checkout@v7
    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: maros-proximal-exact-minimal-${{ matrix.shard }}
        repository-cache: true
    - name: Classify Maros shard
      env:
        SIP_CORPUS_SHARD_COUNT: 4
        SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
      run: |
        test "$(bazel query 'kind(".*_test", @maros_meszaros//:*)' --output=label | wc -l)" -eq 138
        tools/cutest/classify_corpus.sh maros_meszaros .corpus-runs/maros-proximal-exact-minimal 20 2
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: maros-proximal-exact-minimal-${{ matrix.shard }}
        path: .corpus-runs/maros-proximal-exact-minimal
