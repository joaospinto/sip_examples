name: Mountain car warm-start debug

on:
  workflow_dispatch:
  push:
    branches: [debug-dymos-mountain-warmstart-20260713]

permissions:
  contents: read

jobs:
  solve:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Run all mountain-car backends
      continue-on-error: true
      run: >-
        bazel test
        //sip-ipopt/casadi_problems/dymos:mountain_car
        //sip-optimal-control/casadi_problems/dymos:mountain_car
        //sip-qdldl/casadi_problems/dymos:mountain_car
        --keep_going
        --test_output=all

    - name: Log SIP-QDLDL convergence
      continue-on-error: true
      run: >-
        bazel test
        //sip-qdldl/casadi_problems/dymos:mountain_car
        --cache_test_results=no
        --test_env=SIP_CASADI_PROBLEMS_PRINT_LOGS=1
        --test_output=all
