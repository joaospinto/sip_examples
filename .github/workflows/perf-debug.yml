name: Performance debug

on:
  workflow_dispatch:
  push:
    branches: [debug-perf-corpora-20260712]

permissions:
  contents: read

jobs:
  cutest-ipopt:
    name: CUTEst IPOPT corrected recovery shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        shard: [79, 175, 271, 367, 463, 559, 655, 751, 847, 943, 1039, 1135, 1231, 1327, 1423, 1519]

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-cutest-ipopt-corrected-${{ matrix.shard }}
        repository-cache: true

    - name: Classify CUTEst IPOPT shard
      env:
        SIP_CORPUS_SHARD_COUNT: 1539
        SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
      run: tools/cutest/classify_corpus.sh @cutest_sif//ipopt .corpus-runs/cutest-ipopt 20 2

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-ipopt-corrected-${{ matrix.shard }}
        path: .corpus-runs/cutest-ipopt
