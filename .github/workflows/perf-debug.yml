name: Performance debug

on:
  workflow_dispatch:
  push:
    branches: [debug-perf-corpora-20260712]

permissions:
  contents: read

jobs:
  cutest:
    name: CUTEst filter ${{ matrix.threshold }} shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        threshold: [50, 100]
        shard: [0, 1, 2, 3]

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.threshold }}-${{ matrix.shard }}
        repository-cache: true

    - name: Classify CUTEst shard
      env:
        SIP_CORPUS_PROBLEMS_FILE: .github/perf-transition-problems.txt
        SIP_CORPUS_SHARD_COUNT: 4
        SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
        SIP_CUTEST_FILTER_MIN_LS: ${{ matrix.threshold }}
      run: tools/cutest/classify_corpus.sh cutest_sif .corpus-runs/cutest-sif-${{ matrix.threshold }} 20 2

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-sif-${{ matrix.threshold }}-${{ matrix.shard }}
        path: .corpus-runs/cutest-sif-${{ matrix.threshold }}
