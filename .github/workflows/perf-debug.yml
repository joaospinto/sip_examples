name: Performance debug

on:
  workflow_dispatch:
  push:
    branches: [debug-perf-corpora-20260712]

permissions:
  contents: read

jobs:
  cutest-ipopt:
    name: CUTEst IPOPT recovery shard ${{ matrix.shard }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [7, 19]

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-cutest-ipopt-recovery-${{ matrix.shard }}
        repository-cache: true

    - name: Classify CUTEst IPOPT shard
      env:
        SIP_CORPUS_SHARD_COUNT: 24
        SIP_CORPUS_SHARD_INDEX: ${{ matrix.shard }}
      run: tools/cutest/classify_corpus.sh @cutest_sif//ipopt .corpus-runs/cutest-ipopt 20 2

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: cutest-ipopt-recovery-${{ matrix.shard }}
        path: .corpus-runs/cutest-ipopt
