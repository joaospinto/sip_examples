name: Windows Double Integrator Debug

on:
  push:
    branches:
      - debug-windows-double-integrator
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Double integrator ${{ matrix.sanitizer }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: windows-double-integrator-debug
        repository-cache: true

    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Probe local toolchain
      shell: pwsh
      run: |
        where.exe clang-cl
        clang-cl --version
        if (Get-Command cl -ErrorAction SilentlyContinue) {
          cl 2>&1 | Select-Object -First 5
        } else {
          Write-Host "cl is not on PATH"
        }
        bazel version

    - name: Test with ${{ matrix.sanitizer }}
      shell: pwsh
      run: |
        $bazelArgs = @(
          "test",
          "--verbose_failures",
          "--test_output=all",
          "--nocache_test_results",
          "--test_env=SIP_CASADI_PROBLEMS_PRINT_LOGS=1",
          "--copt=/Z7",
          "--copt=/Od",
          "--cxxopt=/Od",
          "--linkopt=/DEBUG"
        )

        if ("${{ matrix.sanitizer }}" -eq "asan") {
          $bazelArgs += @(
            "--copt=/fsanitize=address",
            "--linkopt=/fsanitize=address"
          )
        } else {
          $llvmBin = Split-Path (Get-Command clang-cl).Source
          $llvmRoot = Split-Path $llvmBin
          $bazelArgs += @(
            "--repo_env=BAZEL_LLVM=$llvmRoot",
            "--compiler=clang-cl",
            "--platforms=//:windows_clang_cl",
            "--extra_execution_platforms=//:windows_clang_cl",
            "--copt=-fsanitize=undefined",
            "--copt=-fno-sanitize-recover=undefined",
            "--linkopt=-fsanitize=undefined"
          )
        }

        $bazelArgs += "//sip-optimal-control/dymos:double_integrator"

        & bazel @bazelArgs

    - name: Print test logs
      if: always()
      shell: pwsh
      run: |
        $logs = @(
          "bazel-testlogs/sip-optimal-control/dymos/double_integrator/test.log"
        )
        foreach ($log in $logs) {
          Write-Host "===== $log ====="
          if (Test-Path $log) {
            Get-Content $log
          } else {
            Write-Host "missing"
          }
        }

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: windows-double-integrator-${{ matrix.sanitizer }}-testlogs
        path: |
          bazel-testlogs/sip-optimal-control/dymos/double_integrator/test.log
        if-no-files-found: ignore
