name: Windows Double Integrator Debug

on:
  push:
    branches:
      - debug-windows-double-integrator
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zig-opt:
    name: Double integrator zig opt
    runs-on: windows-2025

    steps:
    - uses: actions/checkout@v7

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: windows-double-integrator-zig-opt
        repository-cache: true

    - name: Test normal Zig Windows opt build
      shell: pwsh
      run: |
        bazel test --verbose_failures --test_output=all --nocache_test_results --test_env=SIP_CASADI_PROBLEMS_PRINT_LOGS=1 //sip-optimal-control/dymos:double_integrator

    - name: Print test log
      if: always()
      shell: pwsh
      run: |
        $log = "bazel-testlogs/sip-optimal-control/dymos/double_integrator/test.log"
        if (Test-Path $log) {
          Get-Content $log
        } else {
          Write-Host "missing $log"
        }
